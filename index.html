026", "material": "# Avaliação de Dados Sintéticos — Material\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 03 · **Data:** 05/05/2026 · **Professor:** Jefferson de Oliveira Silva (Eixo COM)\n>\n> Fonte única: artigo *\"Evaluating Synthetic Data — The Million Dollar Question\"*, de Andrew Skabar, PhD (TDS Archive / Towards Data Science, 14/02/2024). Conteúdo limpo de navegação/rodapé e traduzido/estruturado, preservando a fidelidade ao original.\n\n---\n\n## Evaluating Synthetic Data — A pergunta de um milhão de dólares\n\n> **Subtítulo:** *Meus datasets real e sintético são amostras aleatórias da mesma distribuição-mãe (parent distribution)?*\n\nQuando geramos dados sintéticos, tipicamente criamos um **modelo** para os nossos dados reais (ou 'observados') e usamos esse modelo para gerar dados sintéticos. Esses dados observados normalmente são compilados de experiências do mundo real — medições de características físicas de flores de íris, detalhes sobre pessoas que deram calote em crédito, ou que adquiriram alguma condição médica.\n\nPodemos pensar nos dados observados como tendo vindo de uma **'distribuição-mãe' (parent distribution)** — a verdadeira distribuição subjacente da qual os dados observados são uma **amostra aleatória (random sample)**. É claro que nunca conhecemos essa distribuição-mãe — ela precisa ser estimada, e esse é o propósito do nosso modelo.\n\nMas se o nosso modelo conseguir produzir dados sintéticos que possam ser considerados uma **amostra aleatória da mesma distribuição-mãe**, então acertamos na mosca (hit the jackpot):\n- os dados sintéticos terão as mesmas propriedades estatísticas e padrões dos dados observados (**fidelidade / fidelity**);\n- serão igualmente úteis em tarefas como regressão ou classificação (**utilidade / utility**);\n- e, por serem uma amostra aleatória, não há risco de identificarem os dados observados (**privacidade / privacy**).\n\nMas como saber se atingimos esse objetivo elusivo?\n\n---\n\n## Parte 1 — Alguns experimentos simples\n\nConsidere dois datasets e tente responder:\n\n> Os datasets são amostras aleatórias da mesma distribuição-mãe, ou um foi derivado do outro aplicando pequenas perturbações aleatórias?\n\nOs datasets claramente exibem propriedades estatísticas similares, como distribuições marginais e covariâncias. Eles também teriam desempenho similar numa tarefa de classificação em que um classificador treinado num dataset é testado no outro.\n\nMas suponha que plotássemos os pontos de cada dataset no mesmo gráfico. Se os datasets são amostras aleatórias da mesma distribuição-mãe, esperaríamos intuitivamente que os pontos de um dataset estivessem **intercalados** com os do outro, de modo que, em média, os pontos de um conjunto estejam tão próximos (tão 'similares') dos seus vizinhos mais próximos no *mesmo* conjunto quanto estão dos seus vizinhos mais próximos no *outro* conjunto. Porém, se um dataset é uma leve perturbação aleatória do outro, então os pontos de um conjunto serão **mais similares** aos seus vizinhos mais próximos no *outro* conjunto do que aos seus vizinhos no *mesmo* conjunto. Isso leva ao teste a seguir.\n\n### O Teste de Similaridade Máxima (Maximum Similarity Test)\n\nPara cada dataset, calcule a similaridade entre cada instância e o seu vizinho mais próximo no **mesmo** dataset. Chame essas de **'similaridades intra-conjunto máximas' (maximum intra-set similarities)**. Se os datasets têm as mesmas características distribucionais, a distribuição das similaridades intra-conjunto deve ser similar para cada dataset.\n\nAgora calcule a similaridade entre cada instância de um dataset e o seu vizinho mais próximo no **outro** dataset, e chame essas de **'similaridades cruzadas máximas' (maximum cross-set similarities)**. Se a distribuição das similaridades cruzadas máximas for igual à distribuição das similaridades intra-conjunto máximas, então os datasets podem ser considerados amostras aleatórias da mesma distribuição-mãe.\n\n> Para o teste ser válido, cada dataset deve conter o **mesmo número de exemplos**.\n\nComo os datasets aqui contêm uma mistura de variáveis numéricas e categóricas, precisamos de uma medida de similaridade que acomode isso. Usamos a **Similaridade de Gower (Gower Similarity)**¹.\n\n**Resultado do experimento:** em média, as instâncias de um dataset eram mais similares aos seus vizinhos mais próximos no *outro* dataset do que aos seus vizinhos no *mesmo* dataset. Isso indica que os datasets são mais provavelmente **perturbações** um do outro do que amostras aleatórias da mesma distribuição-mãe. E de fato eram perturbações: o Dataset 1 foi gerado de um modelo de mistura de gaussianas (Gaussian mixture model); o Dataset 2 foi gerado selecionando (sem reposição) uma instância do Dataset 1 e aplicando uma pequena perturbação aleatória.\n\n> O maior perigo de pontos sintéticos estarem perto demais dos observados é a **privacidade** — ou seja, conseguir identificar pontos do conjunto observado a partir do conjunto sintético. Isso aconteceu mesmo num caso em que a similaridade cruzada máxima média era apenas **0,3% maior** que a similaridade intra-conjunto máxima média!\n\n### Modelando e sintetizando\n\nAo criar um modelo para o Dataset 1 (estimado como uma mistura de gaussianas) e gerar um dataset sintético (Dataset 3), os resultados foram: as três médias idênticas até três algarismos significativos, e os três histogramas muito similares. Portanto, segundo o Teste de Similaridade Máxima, ambos podem ser razoavelmente considerados amostras aleatórias da mesma distribuição-mãe. O exercício de geração foi um sucesso, alcançando a **trinca (trifecta): fidelidade, utilidade e privacidade.**\n\n> [O código Python usado na Parte 1 está disponível em https://github.com/a-skabar/TDS-EvalSynthData]\n\n---\n\n## Parte 2 — Datasets reais, geradores reais\n\nO dataset da Parte 1 é simples e modelável com uma mistura de gaussianas. A maioria dos datasets do mundo real é muito mais complexa. Aqui, vários geradores de dados sintéticos são aplicados a datasets reais populares, comparando as distribuições de similaridades máximas dentro e entre os conjuntos observado e sintético.\n\n**Os seis datasets** vêm do **repositório UCI**² e são clássicos da literatura de machine learning. Todos são de **tipo misto** (categóricas + numéricas), escolhidos por variarem no equilíbrio entre features categóricas e numéricas.\n\n**Os seis geradores** representam as principais abordagens:\n- **CopulaGAN**³, **GaussianCopula**, **CTGAN**³ e **TVAE**³ — das bibliotecas do **Synthetic Data Vault (SDV)**⁴;\n- **synthpop**⁵ — pacote open-source em R;\n- **UNCRi** — ferramenta proprietária do framework *Unified Numeric/Categorical Representation and Inference*⁶.\n\nTodos usados com configurações padrão.\n\n### Métricas e o teste TSTR\n\nA tabela de resultados mostra as similaridades intra- e cruzadas máximas médias de cada gerador em cada dataset:\n- Entradas em **vermelho:** privacidade comprometida (similaridade cruzada máxima média **excede** a similaridade intra-conjunto máxima média nos dados observados).\n- Entradas em **verde:** a maior similaridade cruzada máxima média (excluindo as vermelhas).\n- Última coluna: o resultado do teste **TSTR — Train on Synthetic, Test on Real (Treinar no Sintético, Testar no Real)**: um classificador ou regressor é treinado nos exemplos sintéticos e testado nos exemplos reais (observados). Para o Boston Housing (regressão), reporta-se o **MAE (mean absolute error)**; para os demais (classificação), reporta-se a **AUC (area under ROC curve)**.\n\n**Achados principais:**\n- Para os geradores que **não** violaram privacidade, a similaridade cruzada máxima média ficou muito próxima da intra-conjunto máxima média nos dados observados — e as distribuições (histogramas) eram claramente similares (de forma marcante no Census Income).\n- O gerador com a maior similaridade cruzada máxima média em cada dataset (excluindo os vermelhos) também teve o **melhor desempenho no TSTR**. Ou seja: embora nunca se possa afirmar ter descoberto a 'verdadeira' distribuição subjacente, o gerador mais eficaz para cada dataset capturou as features cruciais dessa distribuição.\n\n### Privacidade\n\nApenas dois dos geradores tiveram problemas de privacidade: **synthpop** e **TVAE**, cada um violando em 3 dos 6 datasets. Em dois casos (TVAE no Cleveland Heart Disease e TVAE no Credit Approval), a violação foi particularmente severa: os exemplos sintéticos ficaram **similares demais entre si** e dos seus vizinhos nos dados observados — uma representação ruim da distribuição-mãe. A causa provável: o Credit Approval contém várias features numéricas extremamente assimétricas (highly skewed).\n\n### Outras observações\n\n- Os dois geradores **baseados em GAN** — CopulaGAN e CTGAN — estiveram consistentemente entre os **piores**, o que surpreende dada a popularidade das GANs.\n- O **GaussianCopula** teve desempenho medíocre em quase todos, exceto no Wisconsin Breast Cancer. Seu desempenho fraco no Iris (dataset simples, modelável por mistura de gaussianas) foi especialmente surpreendente.\n- Os geradores **mais consistentes** foram **synthpop** e **UNCRi**, ambos operando por **imputação sequencial (sequential imputation)**: só precisam estimar e amostrar de uma **distribuição condicional univariada** (ex.: P(x₇ | x₁, x₂, …)), o que é tipicamente muito mais fácil do que modelar e amostrar de uma distribuição multivariada (ex.: P(x₁, x₂, x₃, …)) — que é, implicitamente, o que GANs e VAEs fazem. O synthpop estima distribuições com árvores de decisão (fonte do overfitting a que é propenso); o UNCRi usa uma abordagem baseada em vizinhos mais próximos, com hiperparâmetros otimizados por validação cruzada que previne overfitting.\n\n---\n\n## Conclusão\n\nA geração de dados sintéticos é um campo novo e em evolução, e ainda não há técnicas de avaliação padrão — mas há consenso de que os testes devem cobrir **fidelidade, utilidade e privacidade**. Porém, embora todas sejam importantes, **elas não estão em pé de igualdade**.\n\nPor exemplo, um dataset sintético pode ir bem em fidelidade e utilidade mas falhar em privacidade. Isso **não** lhe dá um \"dois de três\": se os exemplos sintéticos estão perto demais dos observados (falhando no teste de privacidade), o modelo sofreu **overfitting (sobreajuste)**, tornando os testes de fidelidade e utilidade **sem sentido**. Há uma tendência de alguns fornecedores proporem medidas de pontuação única que combinam múltiplos testes — algo baseado na mesma lógica equivocada do \"dois de três\".\n\nSe um dataset sintético pode ser considerado uma **amostra aleatória da mesma distribuição-mãe** que os dados observados, então não há como fazer melhor — atingimos o máximo de fidelidade, utilidade e privacidade. O **Teste de Similaridade Máxima** mede o quanto dois datasets podem ser considerados amostras aleatórias da mesma distribuição-mãe, baseado na noção simples e intuitiva: se observado e sintético são amostras da mesma distribuição-mãe, uma instância sintética deve ser, em média, tão similar ao seu vizinho observado mais próximo quanto uma instância observada é similar ao seu vizinho observado mais próximo.\n\n### Medida de pontuação única proposta\n\n> **Razão = (similaridade cruzada máxima média) / (similaridade intra-conjunto máxima média nos dados observados)**\n>\n> Quanto mais perto de **1 — sem exceder 1 —** melhor a qualidade do dado sintético. (Exceder 1 indica violação de privacidade / overfitting.) Deve, é claro, ser acompanhada por uma checagem de sanidade dos histogramas.\n\n---\n\n## Referências\n\n1. Gower, J. C. (1971). *A general coefficient of similarity and some of its properties.* Biometrics, 27(4), 857–871.\n2. Dua, D. & Graff, C. (2017). *UCI Machine Learning Repository.* http://archive.ics.uci.edu/ml\n3. Xu, L., Skoularidou, M., Cuesta-Infante, A. and Veeramachaneni, K. *Modeling Tabular data using Conditional GAN.* NeurIPS, 2019.\n4. Patki, N., Wedge, R., & Veeramachaneni, K. (2016). *The synthetic data vault.* IEEE DSAA (pp. 399–410).\n5. Nowok, B., Raab G.M., Dibben, C. (2016). *synthpop: Bespoke Creation of Synthetic Data in R.* Journal of Statistical Software, 74(11).\n6. UNCRi framework — http://skanalytix.com/uncri-framework\n7. Harrison, D., & Rubinfeld, D.L. (1978). *Boston Housing Dataset.*\n8. Kohavi, R. (1996). *Census Income.* UCI ML Repository.\n9. Janosi, A. et al. (1988). *Heart Disease.* UCI ML Repository.\n10. Quinlan, J.R. (1987). *Credit Approval.* UCI ML Repository.\n11. Fisher, R.A. (1988). *Iris.* UCI ML Repository.\n12. Wolberg, W. et al. (1995). *Breast Cancer Wisconsin (Diagnostic).* UCI ML Repository.\n", "explicacao": "# Avaliação de Dados Sintéticos — Explicação\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 03 · **Data:** 05/05/2026 · **Professor:** Jefferson de Oliveira Silva\n>\n> Explicação detalhada do artigo de Andrew Skabar (ver [`01-material.md`](01-material.md)). Este autoestudo é a continuação direta do [Autoestudo 01 — Geração de Dados Sintéticos](../autoestudo-01-geracao-de-dados-sinteticos/02-explicacao.md): lá vimos *como gerar*, aqui vemos *como avaliar se o que foi gerado presta*.\n\n---\n\n## 1. Contexto geral: a \"pergunta de um milhão de dólares\"\n\nNo Prog-01, aprendemos a **gerar** dados sintéticos e vimos, de passagem, que a qualidade se mede em três dimensões: **fidelidade, utilidade e privacidade**. Mas ficou uma pergunta no ar: *na prática, como eu sei se o meu dado sintético é bom?* É exatamente isso que este autoestudo ataca — e o autor chama de \"a pergunta de um milhão de dólares\" porque, sem uma resposta confiável, você pode estar tomando decisões (ou vendendo um produto) baseado em dados sintéticos que parecem bons mas são lixo.\n\nA grande sacada do artigo é **reduzir as três dimensões a uma única pergunta elegante**:\n\n> **\"O meu dataset real e o meu dataset sintético são amostras aleatórias da mesma distribuição-mãe?\"**\n\nSe a resposta for *sim*, você ganhou tudo de uma vez. Vamos entender por quê — mas antes, o conceito central.\n\n### A analogia da receita de família\n\nImagine que sua avó faz um brigadeiro perfeito, mas nunca escreveu a receita — ela cozinha \"no olho\". Essa **receita mental dela é a \"distribuição-mãe\" (parent distribution)**: a verdadeira regra que gera os brigadeiros. Cada brigadeiro que ela faz é uma **amostra aleatória (random sample)** dessa receita — todos um pouco diferentes, mas todos \"da mesma família\".\n\nAgora você quer reproduzir. Você prova vários brigadeiros dela e tenta **estimar** a receita (esse é o seu **modelo**). Aí você faz os seus brigadeiros (os **dados sintéticos**). A pergunta de ouro: *os seus brigadeiros são indistinguíveis dos dela — como se tivessem saído da mesma receita — ou são cópias decoradas de brigadeiros específicos que você provou?*\n\n- Se forem \"da mesma receita\" → perfeito: têm o mesmo sabor (**fidelidade**), servem pra mesma festa (**utilidade**), e ninguém consegue dizer \"esse aqui é a cópia exata daquele que a vovó fez terça-feira\" (**privacidade**).\n- Se você só **decorou e copiou** brigadeiros específicos → você \"vazou\" os originais (quebra de privacidade) e na verdade nem aprendeu a receita.\n\nEsse segundo caso tem um nome técnico crucial: **overfitting (sobreajuste)** — o modelo decorou os exemplos em vez de aprender o padrão. Segura essa palavra, ela é o vilão da história.\n\n---\n\n## 2. Conceitos-chave\n\n### 2.1. Distribuição-mãe (parent distribution) e amostra aleatória\n\n- **Distribuição-mãe (parent distribution):** a verdadeira distribuição estatística subjacente que \"gera\" os dados do mundo real. **Nunca a conhecemos diretamente** — só vemos amostras dela.\n- **Amostra aleatória (random sample):** um punhado de pontos sorteados dessa distribuição. Os seus dados observados (reais) são uma amostra aleatória da distribuição-mãe.\n- **Modelo:** a nossa *estimativa* da distribuição-mãe, construída a partir dos dados observados.\n\nA meta da geração de dados sintéticos, reformulada: fazer o modelo bom o suficiente para que os dados sintéticos que ele produz **pareçam mais uma amostra aleatória da mesma distribuição-mãe** — nem cópias dos originais, nem coisa de outra distribuição.\n\n### 2.2. Por que \"mesma distribuição-mãe\" resolve as três dimensões de uma vez\n\nEsse é o argumento mais bonito do artigo:\n\n| Dimensão | O que exige | Por que \"mesma distribuição-mãe\" garante |\n|---|---|---|\n| **Fidelidade (fidelity)** | mesmas propriedades estatísticas e padrões | amostras da mesma distribuição têm, por definição, as mesmas estatísticas |\n| **Utilidade (utility)** | servir igual para regressão/classificação | se as estatísticas são as mesmas, um modelo treinado num funciona no outro |\n| **Privacidade (privacy)** | não dá pra identificar os reais | uma amostra *aleatória* não copia pontos específicos → nada a vazar |\n\nPor isso, atingir \"mesma distribuição-mãe\" é o **teto**: não dá pra fazer melhor que isso.\n\n### 2.3. A tensão fidelidade ↔ privacidade (e por que não é \"2 de 3\")\n\nAqui está o insight que mais separa um iniciante de alguém que entende o assunto.\n\nVocê poderia pensar: \"se meu dado sintético é *idêntico* ao real, a fidelidade é perfeita!\" **Errado** — porque se ele é idêntico, ele *é* o dado real, e você acabou de vazar tudo (privacidade zero). Existe uma **tensão fundamental**: quanto mais perto você chega de copiar os pontos reais, melhor a fidelidade *aparenta* ser, mas pior a privacidade fica.\n\nO ponto-chave do artigo: **as três dimensões NÃO estão em pé de igualdade.** Se um dado sintético vai bem em fidelidade e utilidade mas falha em privacidade, isso **não** é \"dois acertos de três\". É **falha total** — porque a única forma de falhar privacidade é por **overfitting** (o modelo decorou os pontos), e um modelo que decorou não aprendeu a distribuição de verdade, o que torna a \"boa fidelidade\" e a \"boa utilidade\" **ilusões sem sentido**. O autor critica explicitamente os fornecedores que vendem uma \"nota única\" somando os três testes — é a mesma lógica furada do \"2 de 3\".\n\n### 2.4. O Teste de Similaridade Máxima (Maximum Similarity Test)\n\nComo medir se dois datasets vêm da mesma distribuição-mãe? O artigo propõe um teste **geometricamente intuitivo**. A ideia: comparar \"quão perto cada ponto está do vizinho mais próximo\".\n\nDois tipos de medida:\n- **Similaridade intra-conjunto máxima (maximum intra-set similarity):** para cada ponto, quão parecido ele é do vizinho **mais próximo dentro do seu próprio conjunto**.\n- **Similaridade cruzada máxima (maximum cross-set similarity):** para cada ponto de um conjunto, quão parecido ele é do vizinho **mais próximo no outro conjunto**.\n\nA lógica do teste:\n\n> Se os dois conjuntos vêm da mesma distribuição-mãe, os pontos ficam **intercalados/misturados**. Então, em média, um ponto está tão perto do vizinho no *outro* conjunto quanto do vizinho no *seu próprio* conjunto. → **intra ≈ cross.**\n>\n> Se um conjunto é uma **cópia perturbada** do outro (overfitting), cada ponto sintético tem um \"gêmeo\" quase idêntico no conjunto real. Então ele fica **mais perto** do vizinho no outro conjunto do que do vizinho no seu próprio. → **cross > intra.** 🚨 Alarme de privacidade.\n\n**Analogia da festa:** imagine duas turmas (vermelha e preta) numa festa.\n- Se todo mundo se misturou na pista, seu vizinho mais próximo é tão provavelmente da sua turma quanto da outra (intra ≈ cross) → \"mesma população\".\n- Se cada pessoa de vermelho está colada num clone seu de preto (casais idênticos), então o vizinho mais próximo de cada um é sempre da outra turma (cross > intra) → as turmas não são populações independentes; uma copiou a outra.\n\n> Detalhe impressionante do experimento: bastou a similaridade cruzada ser **0,3% maior** que a intra para já dar pra identificar pares — mostrando o quão sensível a privacidade é.\n\n### 2.5. Similaridade de Gower (Gower Similarity)\n\nUm detalhe prático importante: dados reais misturam **variáveis numéricas** (idade, salário) e **categóricas** (cidade, sexo, sim/não). A distância euclidiana clássica não sabe lidar com \"São Paulo − Recife\". A **Similaridade de Gower** resolve isso: é uma medida que combina variáveis numéricas e categóricas numa só nota de similaridade (de 0 a 1). Por isso o artigo a usa.\n\n### 2.6. O teste TSTR (Train on Synthetic, Test on Real)\n\nEsse é o teste de **utilidade** na prática, e o nome é autoexplicativo: **Treinar no Sintético, Testar no Real**.\n\n1. Pegue só o dado **sintético** e treine um modelo de ML (classificador ou regressor) nele.\n2. Teste esse modelo no dado **real**.\n3. Se ele vai bem no real (apesar de nunca ter visto dado real no treino), então o sintético capturou os padrões que importam → **alta utilidade**.\n\nMétricas usadas:\n- **AUC (Area Under the ROC Curve):** para classificação. Vai de 0,5 (chute aleatório) a 1,0 (perfeito). Mede quão bem o modelo separa as classes.\n- **MAE (Mean Absolute Error / Erro Absoluto Médio):** para regressão (no caso, o Boston Housing). Quanto **menor**, melhor.\n\nO achado lindo do artigo: o gerador com **maior similaridade cruzada** (sem violar privacidade) foi também o que teve **melhor TSTR**. Ou seja, as duas formas de medir qualidade concordaram — boa fidelidade estatística \"anda junto\" com boa utilidade prática.\n\n### 2.7. Os geradores testados (e a surpresa)\n\nO artigo testou seis geradores, das grandes famílias que já vimos no Prog-01:\n- **Baseados em Cópula (Copula):** GaussianCopula, CopulaGAN.\n- **Baseados em GAN:** CTGAN, CopulaGAN.\n- **Baseados em VAE:** TVAE.\n- **Imputação sequencial (sequential imputation):** synthpop (usa árvores de decisão), UNCRi (usa vizinhos mais próximos + validação cruzada).\n\n**A grande surpresa:** as **GANs** (CTGAN, CopulaGAN) — as mais \"badaladas\" e modernas — foram **consistentemente as piores**. E os métodos de **imputação sequencial** (synthpop, UNCRi) foram os melhores.\n\n**Por quê?** A explicação técnica vale ouro: GANs e VAEs tentam modelar a **distribuição multivariada inteira** de uma vez — `P(x₁, x₂, x₃, …)` — que é dificílimo. Já a imputação sequencial quebra o problema: gera uma variável de cada vez, condicionada às anteriores — `P(x₇ | x₁, x₂, …)` — que são **distribuições univariadas**, muito mais fáceis de estimar bem. É o velho \"dividir para conquistar\".\n\n> Lição: **o método mais sofisticado/popular nem sempre é o melhor.** Para dados tabulares, técnicas mais \"simples\" frequentemente ganham das GANs.\n\n### 2.8. A pontuação única proposta\n\nO autor fecha propondo uma métrica honesta:\n\n> **Razão = (similaridade cruzada máxima média) ÷ (similaridade intra-conjunto máxima média no observado)**\n\n- Razão **próxima de 1 (sem passar de 1)** = excelente: sintético e real são indistinguíveis em distribuição, sem cópia.\n- Razão **> 1** = 🚨 os sintéticos estão *perto demais* dos reais → overfitting / quebra de privacidade.\n- Sempre acompanhada de uma **checagem visual dos histogramas** (sanity check) — nunca confie só no número.\n\n---\n\n## 3. Exemplo prático: a lógica do teste em pseudocódigo\n\n```python\n# Conceito do Maximum Similarity Test (usando Gower para tipo misto)\nintra_real  = [max_similarity(x, resto_de(real))      for x in real]      # vizinho no mesmo conjunto\nintra_synth = [max_similarity(x, resto_de(synth))     for x in synth]\ncross       = [max_similarity(x, synth)               for x in real]      # vizinho no outro conjunto\n\nrazao = media(cross) / media(intra_real)\n\nif razao > 1:\n    print(\"🚨 Privacidade comprometida (overfitting): sintéticos perto demais dos reais\")\nelif razao_proxima_de(1):\n    print(\"✅ Provavelmente mesma distribuição-mãe: fidelidade + utilidade + privacidade\")\n# e sempre: plote os histogramas de intra_real, intra_synth e cross para conferir\n```\n\n---\n\n## 4. Cases reais no mundo\n\n- **Synthetic Data Vault (MIT):** as bibliotecas testadas no artigo (CTGAN, TVAE, GaussianCopula) nasceram no MIT e são o padrão open-source de geração de dados tabulares sintéticos — usadas por bancos e seguradoras para compartilhar dados sem vazar clientes. Este autoestudo mostra que escolher o gerador \"na fé da fama\" (GAN) pode dar errado: **é preciso avaliar**.\n- **Saúde:** ao gerar prontuários sintéticos para pesquisa, a regra \"razão ≤ 1\" é literalmente a fronteira entre um dataset publicável e um **vazamento de dados de pacientes** (com risco legal sob LGPD/GDPR — conexão direta com o Prog-01).\n- **Datasets clássicos:** o estudo usa o **Iris** (flores, R.A. Fisher, 1936) e o **Boston Housing** — datasets que são o \"rato de laboratório\" de ML há décadas, o que torna os resultados comparáveis e confiáveis.\n\n---\n\n## 5. Conexão com o módulo\n\n- **Prog-01 (Geração de Dados Sintéticos):** par direto. Lá geramos e citamos fidelidade/utilidade/privacidade; aqui aprofundamos **como medir** essas três, e descobrimos que privacidade tem peso especial (falhar nela invalida o resto).\n- **Teste A/B (tema do módulo):** lembra que no Prog-02 falamos em usar dados sintéticos para *testar pipelines de A/B antes de tocar usuários reais*? Este autoestudo é o controle de qualidade desse insumo: se o dado sintético não passa no Maximum Similarity Test, qualquer simulação de A/B feita sobre ele é não-confiável. Lixo entra, lixo sai.\n- **Matemática:** os conceitos de **distribuição**, **amostra aleatória** e **distribuição-mãe** são exatamente a base de **Matemática-01 (Distribuições de Probabilidade)** e da estatística inferencial de **Matemática-03 (Hipóteses Estatísticas)**. A ideia de \"essas duas amostras vêm da mesma população?\" é *literalmente* a pergunta de um teste de hipóteses — o mesmo raciocínio por trás de decidir se a variante B de um teste A/B é mesmo diferente do controle A.\n- **UX-01 (Métodos Mistos):** o TSTR é um exemplo de método **quantitativo** rigoroso; e a crítica do autor à \"nota única dos fornecedores\" ecoa a importância de não simplificar demais a avaliação.\n\n---\n\n## 6. Resumo estruturado\n\n- **A pergunta central:** real e sintético são **amostras aleatórias da mesma distribuição-mãe**? Se sim, ganha-se fidelidade + utilidade + privacidade de uma vez.\n- **Distribuição-mãe** = a verdadeira distribuição subjacente (nunca conhecida); **modelo** = nossa estimativa dela; **amostra aleatória** = os dados que vemos.\n- **As 3 dimensões não são iguais:** falhar **privacidade** = overfitting = invalida fidelidade e utilidade. Não existe \"2 de 3\".\n- **Maximum Similarity Test:** compara similaridade **intra-conjunto** vs. **cruzada**. Mesma distribuição → intra ≈ cross. Cópia/overfitting → cross > intra (🚨 privacidade).\n- **Similaridade de Gower:** medida que lida com variáveis numéricas **e** categóricas juntas.\n- **TSTR (Train on Synthetic, Test on Real):** treina no sintético, testa no real → mede **utilidade** (AUC p/ classificação, MAE p/ regressão).\n- **Surpresa dos geradores:** **imputação sequencial** (synthpop, UNCRi) bateu as **GANs** (CTGAN, CopulaGAN), porque estimar distribuições **univariadas condicionais** é mais fácil que a multivariada inteira.\n- **Métrica final:** razão `cross / intra` próxima de **1 sem exceder** = ótimo; **> 1** = vazamento. Sempre conferir histogramas.\n\n---\n\n## 7. Auto-reflexão (pra pensar sozinha)\n\n1. Um fornecedor te vende um dataset sintético com \"nota de qualidade 92/100\" combinando fidelidade, utilidade e privacidade. Por que, segundo o artigo, essa nota única pode estar **escondendo** uma falha grave?\n2. No Teste de Similaridade Máxima, o que significaria, na prática, encontrar uma razão `cross/intra` de **1,4**? O que você concluiria sobre o gerador que produziu esses dados?\n3. Por que os métodos de imputação sequencial conseguem ser melhores que as GANs em dados tabulares — e como isso se relaciona com a ideia de \"dividir um problema difícil em vários problemas fáceis\"?\n"}, {"id": "computacao-autoestudo-04-introducao-as-cadeias-de-markov", "materia_slug": "computacao", "materia_label": "Computação", "materia_emoji": "💻", "slug": "autoestudo-04-introducao-as-cadeias-de-markov", "numero": "04", "title": "Introdução às Cadeias de Markov", "date": "08/05/2026", "material": "# Introdução às Cadeias de Markov — Material\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 04 · **Data:** 08/05/2026 · **Professor:** Jefferson de Oliveira Silva (Eixo COM)\n>\n> Duas fontes. A primeira (vídeo) **não teve transcrição fornecida** — reconstrução temática. A segunda (Built In) é o mesmo artigo já usado no [Prog-02](../autoestudo-02-roadmap-do-projeto-perspectiva-de-programacao/01-material.md) (Fonte 2); reproduzido aqui por ser a fonte oficial deste autoestudo dedicado.\n\n---\n\n## Fonte 1 — Vídeo: *Cadeias de Markov Claramente Explicadas*\n\n> ⚠️ **Transcrição não fornecida.** Reconstrução temática (não literal), no espírito de canais didáticos como o Normalized Nerd / StatQuest.\n\n- Uma **Cadeia de Markov** é um modelo de um sistema que pula entre **estados (states)**, onde a probabilidade do próximo estado depende **apenas do estado atual**.\n- Tudo é representado por um **grafo direcionado**: cada **nó** é um estado, cada **seta (aresta)** tem uma probabilidade de transição. As setas que saem de um nó **somam 1**.\n- Exemplo didático típico: prever o clima. Estados = {Ensolarado, Chuvoso}. \"Se hoje está ensolarado, há 80% de chance de amanhã também estar; 20% de chuva.\" Isso vira uma matriz de probabilidades.\n- A **matriz de transição** organiza todas essas probabilidades. Multiplicando o estado atual pela matriz, prevê-se o próximo; repetindo, prevê-se vários passos à frente.\n- Conforme você avança muitos passos, a cadeia tende a uma **distribuição estacionária (stationary distribution)** — as probabilidades de estar em cada estado se estabilizam, independentemente de onde você começou.\n- Aplicações citadas: predição de texto, comportamento de usuários, PageRank do Google, previsão do tempo, modelos financeiros.\n\n---\n\n## Fonte 2 — Built In: *Markov Chain Explained* (Vatsal Patel)\n\n> Atualizado por Matthew Urwin, 22/10/2024. *(Mesmo artigo da Fonte 2 do Prog-02.)*\n\n### Definição\n\nUma **Cadeia de Markov (Markov chain)** é um **modelo estocástico (stochastic model)** que usa matemática para prever a probabilidade de uma sequência de eventos com base no **evento mais recente**. Criada por Andrey Markov. Exemplo comum: o Google prevendo a próxima palavra no Gmail. Até o **PageRank** do Google é um tipo de cadeia de Markov.\n\nO objetivo principal do processo de Markov é **identificar a probabilidade de transição de um estado para outro**. Um dos principais atrativos: o estado futuro de uma variável estocástica depende **apenas do seu estado presente**. (Variável estocástica = variável cujos valores dependem de ocorrências aleatórias.)\n\n### Característica principal: ausência de memória (memorylessness)\n\nA propriedade de **ausência de memória (memorylessness)**: o modelo \"esqueceu\" em que estado o sistema esteve. As previsões dependem **somente do estado atual**, independentes de estados passados e futuros.\n\nBênção e maldição: ao prever palavras (como o Gmail), a previsão não depende de algo escrito parágrafos atrás (bom), mas também não consegue usar contexto distante (ruim) — problema comum em NLP.\n\n### Como criar um modelo de cadeia de Markov\n\nDepende de duas peças: a **matriz de transição** e o **vetor de estado inicial**.\n\n**Matriz de transição (transition matrix), \"P\":** matriz NxN que representa a distribuição de probabilidade das transições. A **soma de cada linha é 1** (matriz estocástica). Um grafo direcionado conectado vira uma matriz de transição; cada elemento é o peso de probabilidade de uma aresta entre dois nós.\n\n```\n     +-----+-----+-----+\n     |  A  |  B  |  C  |\n+-----+-----+-----+-----+\n|  A  |  .2 |  .3 |  .5 |   - soma da linha = 1\n+-----+-----+-----+-----+   - .3 = probabilidade de A ir para B\n|  B  |  .6 |  0  |  .4 |\n+-----+-----+-----+-----+\n|  C  |  .1 | .7  |  .2 |   - .7 = probabilidade de C ir para B\n+-----+-----+-----+-----+\n```\n(Ex.: 60% de chance de ir de B para A.)\n\n**Vetor de estado inicial (initial state vector), \"S\":** vetor Nx1 com a probabilidade de começar em cada um dos N estados.\n\nCom os dois, o produto P × I determina o estado inicial; para prever estados futuros, eleva-se P à **M-ésima potência**.\n\n### Exemplo: predição de texto\n\nCada palavra é um estado; a probabilidade de ir de uma palavra a outra é calculada pela **frequência** no corpus:\n```\nHello --> ['Everyone', ',', 'Everyone', 'Everyone', 'There', 'There', 'There', ...]\nP(palavra) = Frequência da Palavra / Total de Palavras na Lista\nP(Everyone) = 9 / 20 ;  P(,) = 1 / 20 ;  P(There) = 10 / 20\n```\nSe \"Hello\" é a única palavra inicial, o vetor de estado inicial é Nx1 com 100% em \"Hello\".\n\n### Implementação em Python (gerar texto estilo Shakespeare)\n\n```python\nfrom collections import defaultdict\nimport string\nimport random\n\nclass Markov():\n    def __init__(self, file_path):\n        self.file_path = file_path\n        self.text = self.remove_punctuations(self.get_text())\n        self.model = self.model()\n\n    def get_text(self):\n        '''Lê o arquivo e retorna o texto linha por linha numa lista'''\n        text = []\n        for line in open(self.file_path):\n            text.append(line)\n        return ' '.join(text)\n\n    def remove_punctuations(self, text):\n        '''Retorna o texto sem pontuações'''\n        return text.translate(str.maketrans('','', string.punctuation))\n\n    def model(self):\n        '''Mapeia cada palavra às palavras que a seguem (chave -> lista de próximas)'''\n        words = self.text.split(' ')\n        markov_dict = defaultdict(list)\n        for current_word, next_word in zip(words[0:-1], words[1:]):\n            markov_dict[current_word].append(next_word)\n        markov_dict = dict(markov_dict)\n        print('Successfully Trained')\n        return markov_dict\n\ndef predict_words(chain, first_word, number_of_words=5):\n    '''Prevê a próxima palavra da sequência a partir de first_word'''\n    if first_word in list(chain.keys()):\n        word1 = str(first_word)\n        predictions = word1.capitalize()\n        for i in range(number_of_words-1):\n            word2 = random.choice(chain[word1])\n            word1 = word2\n            predictions += ' ' + word2\n        predictions += '.'\n        return predictions\n    else:\n        return \"Word not in corpus\"\n\nif __name__ == '__main__':\n    m = Markov(file_path='Shakespeare.txt')\n    chain = m.model\n    print(predict_words(chain, first_word='do', number_of_words=10))\n```\n\n### FAQ\n\n- **Vida real:** predição de texto do Gmail; comportamento de usuário em redes sociais; tendências de ações; sequências de DNA.\n- **Por que usar:** quando o próximo resultado é aleatório e depende só do estado atual.\n- **É IA?** Não em si, mas é peça-chave em tecnologias de IA, inclusive IA generativa.\n", "explicacao": "# Introdução às Cadeias de Markov — Explicação\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 04 · **Data:** 08/05/2026 · **Professor:** Jefferson de Oliveira Silva\n>\n> Este é o autoestudo **dedicado** às Cadeias de Markov. O [Prog-02 (Roadmap)](../autoestudo-02-roadmap-do-projeto-perspectiva-de-programacao/02-explicacao.md) já apresentou o básico (matriz de transição, memorylessness, vetor de estado inicial). Aqui eu **recapitulo rápido** e **aprofundo** com o que é novo: estados, grafo, transições de n passos, distribuição estacionária, tipos de estado e aplicação ao comportamento do usuário (que prepara o [Prog-05](../autoestudo-05-cadeias-de-markov-e-o-comportamento-do-usuario/02-explicacao.md)).\n\n---\n\n## 1. Contexto geral: recapitulando em 30 segundos\n\nUma **Cadeia de Markov** é um modelo de um sistema que **pula entre estados**, onde a probabilidade do próximo estado depende **só do estado atual** — não de todo o histórico. Essa é a famosa **propriedade de Markov** ou **ausência de memória (memorylessness)**.\n\nA analogia do Banco Imobiliário do Prog-02 continua valendo: a próxima casa depende só de onde você está *agora* + o dado. Mas agora vamos abrir a \"caixa-preta\" e entender os mecanismos com mais profundidade — e, principalmente, **por que isso é tão útil para modelar usuários** num produto digital (e, portanto, para o teste A/B).\n\n> Se você ainda não está confortável com \"matriz de transição\" e \"vetor de estado inicial\", vale reler a seção 3 do Prog-02 antes de continuar. Aqui eu assumo esse básico e construo por cima.\n\n---\n\n## 2. Conceitos-chave (aprofundando)\n\n### 2.1. Estados e o grafo de transição\n\nA forma mais intuitiva de enxergar uma cadeia de Markov é como um **grafo direcionado**:\n- Cada **estado (state)** é um **nó** (um círculo). Estado = uma \"situação\" em que o sistema pode estar (Ensolarado/Chuvoso; ou página Home/Produto/Carrinho/Compra).\n- Cada **transição** é uma **seta** com uma probabilidade.\n- **Regra inviolável:** as setas que *saem* de um nó **somam 1** (você *tem* que ir para algum lugar — inclusive de volta para si mesmo).\n\n```\n        0.8\n      ┌─────┐\n      ▼     │\n   ☀ Ensolarado ──0.2──▶ ☂ Chuvoso\n        ▲                   │\n        └────────0.4────────┘\n              (Chuvoso→Chuvoso: 0.6)\n```\n\nEsse desenho **é** a cadeia de Markov. A matriz de transição é só a mesma informação numa tabela:\n\n|  | →Ensolarado | →Chuvoso |\n|---|---|---|\n| **Ensolarado** | 0,8 | 0,2 |\n| **Chuvoso** | 0,4 | 0,6 |\n\n### 2.2. Prevendo o futuro: transições de n passos\n\nAqui está algo que o Prog-02 só mencionou de passagem e que vale destrinchar. A matriz de transição `P` te dá a probabilidade de **1 passo** no futuro. E se você quiser saber a probabilidade daqui a **2 passos**? Daqui a **10**?\n\nA resposta é elegante: **eleve a matriz à potência**. `P²` te dá as probabilidades de 2 passos, `P³` de 3 passos, `Pⁿ` de n passos.\n\n> **Por que isso funciona (intuição):** ir de A para C em dois passos é \"somar todos os caminhos possíveis passando por algum estado intermediário\" — A→A→C, A→B→C, A→C→C. Multiplicar a matriz por ela mesma faz exatamente essa soma de probabilidades de caminhos. (É a mesma lógica de multiplicação de matrizes que você vê em álgebra linear.)\n\n**Exemplo concreto:** se hoje está ensolarado, qual a chance de estar chuvoso **depois de amanhã** (2 dias)?\n- Caminho 1: Ensolarado→Ensolarado→Chuvoso = 0,8 × 0,2 = 0,16\n- Caminho 2: Ensolarado→Chuvoso→Chuvoso = 0,2 × 0,6 = 0,12\n- Total = **0,28** (28%). Isso é o elemento [Ensolarado][Chuvoso] da matriz `P²`.\n\n### 2.3. A distribuição estacionária (stationary distribution) — o conceito novo mais importante\n\nEsse é o conceito que diferencia uma introdução \"de verdade\" de uma superficial. Pergunta: se você rodar a cadeia por **muitos e muitos passos**, o que acontece?\n\nResposta surpreendente: na maioria das cadeias, as probabilidades de estar em cada estado **se estabilizam num valor fixo — e esse valor não depende de onde você começou.** Esse equilíbrio de longo prazo é a **distribuição estacionária (stationary distribution)**.\n\n> **Analogia:** imagine um shopping com várias lojas. De manhã, todo mundo entra pela porta principal (estado inicial concentrado). Mas depois de horas circulando, a fração de pessoas em cada loja se estabiliza — sempre ~10% na praça de alimentação, ~5% na livraria, etc. — independentemente de por onde entraram. Essa \"foto de equilíbrio\" é a distribuição estacionária.\n\nPor que isso importa para negócio/produto?\n- No clima: \"no longo prazo, qual fração dos dias é chuvosa?\" → a distribuição estacionária.\n- Em um site: \"no equilíbrio, qual fração do tempo os usuários passam em cada página?\" → ajuda a dimensionar servidores, priorizar páginas.\n- **PageRank do Google é literalmente uma distribuição estacionária:** a probabilidade de um \"surfista aleatório\" acabar em cada página da web no longo prazo. Páginas com maior probabilidade estacionária = mais \"importantes\" = aparecem primeiro.\n\n### 2.4. Tipos de estado (vocabulário que enriquece a análise)\n\nNem todo estado se comporta igual. Três tipos que vale conhecer:\n- **Estado recorrente (recurrent):** se você sai dele, vai acabar voltando (cedo ou tarde). Ex.: \"navegando o catálogo\" — o usuário volta a essa página várias vezes.\n- **Estado transiente (transient):** depois de sair, há chance de **nunca mais voltar**. Ex.: a tela de \"primeiro acesso/onboarding\".\n- **Estado absorvente (absorbing):** uma vez que entra, **nunca sai** (probabilidade 1 de continuar nele). Ex.: \"Compra concluída\" ou \"Cancelou a conta (churn)\". É o fim da jornada.\n\n> Estados absorventes são ouro para análise de produto: \"qual a probabilidade de um usuário acabar no estado *Compra* vs. no estado *Abandono*, e em quantos passos?\" é uma pergunta clássica de cadeia de Markov com estados absorventes.\n\n### 2.5. A força e a fraqueza (revisitando a memorylessness com olhos críticos)\n\nA **ausência de memória** é a grande simplificação que torna Markov tratável — e também sua maior limitação:\n- **Força:** simples, rápido, precisa de poucos dados (só as transições de 1 passo). Funciona surpreendentemente bem para muitos sistemas.\n- **Fraqueza:** assume que o passado não importa além do presente. Mas e se o comportamento do usuário depende de quantas vezes ele já visitou? Markov \"puro\" não captura isso. Soluções: **cadeias de Markov de ordem superior (higher-order)**, que olham os últimos 2, 3 estados — ao custo de explodir o tamanho da matriz. (É por essa limitação que os **Transformers**, com atenção de longo alcance, dominaram a geração de texto, como vimos no Prog-02.)\n\n---\n\n## 3. Exemplo prático: um mini-funil de e-commerce como cadeia de Markov\n\nVamos modelar a jornada num site de compras. Estados: `Home`, `Produto`, `Carrinho`, `Compra` (absorvente), `Saiu` (absorvente).\n\n```python\nimport numpy as np\n\nestados = ['Home', 'Produto', 'Carrinho', 'Compra', 'Saiu']\n\n# Matriz de transição (cada linha soma 1)\nP = np.array([\n    # Home  Prod  Cart  Compra Saiu\n    [0.10, 0.50, 0.00, 0.00, 0.40],  # de Home\n    [0.20, 0.30, 0.30, 0.00, 0.20],  # de Produto\n    [0.00, 0.10, 0.20, 0.50, 0.20],  # de Carrinho\n    [0.00, 0.00, 0.00, 1.00, 0.00],  # Compra (absorvente)\n    [0.00, 0.00, 0.00, 0.00, 1.00],  # Saiu (absorvente)\n])\n\n# Todo mundo começa na Home\ns = np.array([1, 0, 0, 0, 0])\n\n# Para onde estão os usuários após 5 passos?\nfor passo in range(5):\n    s = s @ P\nprint(dict(zip(estados, s.round(3))))\n# Mostra a fração que já comprou, ainda navega, ou saiu.\n```\n\nEsse modelo responde perguntas de negócio direto: *\"que fração dos visitantes acaba comprando?\"*, *\"em qual etapa eles mais abandonam?\"*. **E a ponte com teste A/B:** se você mudar a página de Produto (um teste A/B!) e isso aumentar a probabilidade de transição `Produto→Carrinho`, você pode **simular** (com a cadeia + Monte Carlo, do Prog-02) o impacto disso na taxa de compra final — antes mesmo de o resultado completo do teste sair.\n\n---\n\n## 4. Cases reais no mundo\n\n- **Google PageRank:** o algoritmo que fundou o Google é uma cadeia de Markov gigante (cada página da web é um estado). A distribuição estacionária do \"surfista aleatório\" define a relevância. Talvez a aplicação de Markov mais valiosa da história.\n- **Gmail / teclados de celular:** o autocomplete e a sugestão de próxima palavra usam predição sequencial no espírito de Markov (hoje turbinada por redes neurais).\n- **Análise de jornada e churn:** empresas de SaaS modelam a jornada do cliente como cadeia de Markov para prever **churn** (cancelamento — um estado absorvente) e atribuir conversões a canais de marketing (o modelo de atribuição \"Markov chains\" do Google Analytics faz isso).\n- **Spotify / Netflix:** sequências de músicas/episódios assistidos podem ser modeladas como transições entre estados para recomendar o \"próximo\".\n\n---\n\n## 5. Conexão com o módulo\n\n- **Prog-02 (Roadmap):** apresentou Markov como um dos três pilares. Este autoestudo aprofunda o pilar.\n- **Prog-05 (Cadeias de Markov e o Comportamento do Usuário):** é a sequência natural — pega tudo isto e aplica diretamente a modelar usuários, como no exemplo do funil acima.\n- **Prog-07/08 (Monte Carlo):** Markov define *as regras* de transição; Monte Carlo *roda* milhares de jornadas seguindo essas regras para estimar resultados. Dupla inseparável.\n- **Matemática-01 (Distribuições):** o vetor de estado é uma **distribuição de probabilidade** sobre os estados; a distribuição estacionária é seu equilíbrio. E **Matemática-02 (Processos Estocásticos)** é o guarda-chuva teórico que contém as cadeias de Markov.\n- **Teste A/B (tema do módulo):** mudanças testadas via A/B alteram probabilidades de transição; modelar o funil como Markov permite *projetar* o impacto de uma variante na conversão final.\n\n---\n\n## 6. Resumo estruturado\n\n- **Cadeia de Markov** = sistema que pula entre **estados**; o próximo depende **só do atual** (memorylessness).\n- **Grafo de transição:** nós = estados, setas = probabilidades; setas que saem de um nó **somam 1**. Mesma info que a **matriz de transição P**.\n- **n passos:** `Pⁿ` dá as probabilidades de transição depois de n passos (soma de todos os caminhos).\n- **Distribuição estacionária:** o equilíbrio de longo prazo, **independente do início**. É o que o **PageRank** calcula.\n- **Tipos de estado:** recorrente (volta), transiente (pode não voltar), **absorvente** (não sai — ex.: Compra, Churn).\n- **Força:** simples, poucos dados. **Fraqueza:** ignora o passado distante (daí ordem superior / Transformers).\n- **Aplicação:** funis, jornada do usuário, churn, atribuição — e simular o impacto de testes A/B na conversão.\n\n---\n\n## 7. Auto-reflexão (pra pensar sozinha)\n\n1. No grafo do clima (Ensolarado 0,8/0,2; Chuvoso 0,4/0,6), sem fazer a conta exata: você acha que, no longo prazo, há mais dias ensolarados ou chuvosos? Por quê? (Dica: olhe quais transições são mais \"fortes\".)\n2. Por que \"Compra concluída\" e \"Cancelou a conta\" são modelados como estados **absorventes**, e por que isso é útil para um negócio querer calcular a probabilidade de cair em cada um?\n3. A propriedade de memorylessness assume que dá no mesmo um usuário ter chegado ao carrinho na 1ª visita ou na 10ª. Em que situação real essa suposição te enganaria — e como uma cadeia de \"ordem superior\" ajudaria?\n"}, {"id": "computacao-autoestudo-05-cadeias-de-markov-e-o-comportamento-do-usuario", "materia_slug": "computacao", "materia_label": "Computação", "materia_emoji": "💻", "slug": "autoestudo-05-cadeias-de-markov-e-o-comportamento-do-usuario", "numero": "05", "title": "Cadeias de Markov e o Comportamento do Usuário", "date": "13/05/2026", "material": "# Cadeias de Markov e o Comportamento do Usuário — Material\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 05 · **Data:** 13/05/2026 · **Professor:** Jefferson de Oliveira Silva (Eixo COM)\n>\n> Fonte única: tutorial *\"Markov Chains in Python: Beginner Tutorial\"*, de Sejal Jaiswal (DataCamp, 31/12/2019). Conteúdo traduzido/estruturado e limpo de navegação/rodapé, preservando o substantivo e o código.\n\n---\n\n## Markov Chains in Python: Beginner Tutorial\n\nUma **Cadeia de Markov (Markov chain)** é um sistema matemático geralmente definido como uma **coleção de variáveis aleatórias** que transitam de um estado para outro segundo certas regras probabilísticas. Esse conjunto de transições satisfaz a **Propriedade de Markov**: a probabilidade de transitar para qualquer estado em particular depende **somente do estado atual e do tempo decorrido**, e não da sequência de estados que o precedeu. Essa característica única torna os processos de Markov **sem memória (memoryless)**.\n\n### Por que Cadeias de Markov?\n\nTêm uso prolífico em matemática, economia, teoria dos jogos, teoria da comunicação, genética e finanças. Surgem amplamente em estatística (especialmente **estatística bayesiana**) e contextos da teoria da informação. Em problemas do mundo real: estudar sistemas de controle de cruzeiro em veículos, filas de clientes chegando a um aeroporto, taxas de câmbio, etc. O algoritmo **PageRank** (proposto para o motor de busca do Google) é baseado num processo de Markov. O *Subreddit Simulator* do Reddit gera submissões e comentários aleatórios usando cadeias de Markov.\n\n### Cadeia de Markov\n\nUma cadeia de Markov é um **processo aleatório (random/stochastic process)** com a propriedade de Markov — um objeto matemático definido como uma coleção de variáveis aleatórias. Tem **espaço de estados discreto** (conjunto de valores possíveis) ou **conjunto de índices discreto** (geralmente representando o tempo). Normalmente, o termo \"cadeia de Markov\" é reservado para um processo com tempo discreto: a **Cadeia de Markov de Tempo Discreto (Discrete Time Markov Chain, DTMC)**.\n\n### Cadeia de Markov de Tempo Discreto (DTMC)\n\nEnvolve um sistema que está em certo estado a cada passo, com o estado mudando aleatoriamente entre passos. Os passos costumam ser pensados como momentos no tempo (mas poderiam ser distância física ou outra medida discreta). É uma sequência de variáveis aleatórias X1, X2, X3, … com a propriedade de Markov, tal que a probabilidade de ir para o próximo estado depende **apenas do estado presente**:\n\n```\nPr( Xn+1 = x | X1 = x1, X2 = x2, …, Xn = xn ) = Pr( Xn+1 = x | Xn = xn )\n```\n\nA probabilidade de Xn+1 depende só de Xn que o precede. Conhecer o estado anterior é tudo o que é necessário para determinar a distribuição de probabilidade do estado atual (regra da **independência condicional**).\n\nOs valores possíveis de Xi formam um conjunto contável **S**, o **espaço de estados (state space)** da cadeia. O espaço de estados pode ser qualquer coisa: letras, números, placares de basquete ou condições do tempo. Muitas aplicações usam espaços de estados finitos ou contavelmente infinitos, por terem análise estatística mais direta.\n\n### Modelo\n\nUma cadeia de Markov é representada por um **autômato probabilístico**. As mudanças de estado são chamadas **transições**; as probabilidades associadas são as **probabilidades de transição**. Pode ser visto como uma sequência de **grafos direcionados**, onde as arestas do grafo n são rotuladas pelas probabilidades de ir de um estado no tempo n para os outros estados no tempo n+1. A mesma informação é representada pela **matriz de transição**.\n\nSe a cadeia tem N estados possíveis, a matriz é NxN, tal que a entrada (I, J) é a probabilidade de transitar do estado I para o estado J. Além disso, a matriz de transição deve ser uma **matriz estocástica (stochastic matrix)**: as entradas de **cada linha somam exatamente 1** (cada linha representa sua própria distribuição de probabilidade).\n\nO modelo é caracterizado por: um **espaço de estados**, uma **matriz de transição** e um **estado inicial** (dado pela distribuição inicial).\n\n### Exemplo: o humor da CJ\n\nQuando a CJ está triste (o que não é muito usual), ela faz uma de três coisas: vai correr, devora sorvete ou tira uma soneca. A partir de dados históricos:\n- Se passou o dia **dormindo (Sleep)**: no dia seguinte, 60% de chance de correr, 20% de continuar dormindo, 20% de comer sorvete.\n- Se foi **correr (Run)**: 60% de correr de novo, 30% de sorvete, 10% de dormir.\n- Se comeu **sorvete (Icecream)**: 10% de sorvete de novo, 70% de correr, 20% de dormir.\n\nTrês estados: `Sleep`, `Run`, `Icecream`. A matriz de transição é 3x3. As setas que saem de um estado somam exatamente 1; idem as linhas da matriz.\n\n**Pergunta:** \"Começando no estado `Sleep`, qual a probabilidade de a CJ estar correndo (`Run`) ao fim de 2 dias de tristeza?\"\n\nCaminhos possíveis de `Sleep` → `Run` em 2 passos:\n- Sleep→Sleep→Run = 0,2 · 0,6\n- Sleep→Run→Run = 0,6 · 0,6\n- Sleep→Icecream→Run = 0,2 · 0,7\n\nProbabilidade total = (0,2·0,6) + (0,6·0,6) + (0,2·0,7) = **0,62** → **62%** de chance de estar correndo após 2 dias, começando em Sleep.\n\n### Propriedades importantes das cadeias de Markov\n\n- **Redutibilidade (Reducibility):** uma cadeia é **irredutível** se é possível chegar a qualquer estado a partir de qualquer estado (existe um caminho com probabilidade positiva entre quaisquer dois estados).\n- **Periodicidade (Periodicity):** um estado é **periódico** se a cadeia só pode retornar a ele em múltiplos de algum inteiro k > 1. É **aperiódico** se k = 1.\n- **Transitoriedade e Recorrência (Transience and Recurrence):** um estado 'i' é **transiente** se, partindo de 'i', há probabilidade não-nula de **nunca** retornar a 'i'. É **recorrente (persistente)** caso contrário. Recorrente **positivo** se espera-se retornar em número finito de passos; **nulo** caso contrário.\n- **Ergodicidade (Ergodicity):** um estado é **ergódico** se é aperiódico e recorrente positivo. Se todos os estados de uma cadeia irredutível são ergódicos, a cadeia é ergódica.\n- **Estado absorvente (Absorbing State):** um estado 'i' é **absorvente** se é impossível sair dele (p_ii = 1 e p_ij = 0 para i ≠ j). Se todo estado pode alcançar um estado absorvente, a cadeia é uma **cadeia de Markov absorvente**.\n\n### Cadeias de Markov em Python\n\n```python\nimport numpy as np\nimport random as rm\n\n# O espaço de estados\nstates = [\"Sleep\",\"Icecream\",\"Run\"]\n\n# Sequências possíveis de eventos\ntransitionName = [[\"SS\",\"SR\",\"SI\"],[\"RS\",\"RR\",\"RI\"],[\"IS\",\"IR\",\"II\"]]\n\n# Matriz de transição (probabilidades)\ntransitionMatrix = [[0.2,0.6,0.2],[0.1,0.6,0.3],[0.2,0.7,0.1]]\n```\n\nSempre garanta que as probabilidades somem 1:\n\n```python\nif sum(transitionMatrix[0])+sum(transitionMatrix[1])+sum(transitionMatrix[1]) != 3:\n    print(\"Somewhere, something went wrong. Transition matrix, perhaps?\")\nelse: print(\"All is gonna be okay, you should move on!! ;)\")\n```\n\nA função que prevê a sequência de estados (humor) usando `numpy.random.choice` (o argumento `p` recebe a distribuição de probabilidade, isto é, a linha da matriz de transição):\n\n```python\ndef activity_forecast(days):\n    activityToday = \"Sleep\"\n    print(\"Start state: \" + activityToday)\n    activityList = [activityToday]\n    i = 0\n    prob = 1\n    while i != days:\n        if activityToday == \"Sleep\":\n            change = np.random.choice(transitionName[0],replace=True,p=transitionMatrix[0])\n            if change == \"SS\":\n                prob = prob * 0.2; activityList.append(\"Sleep\"); pass\n            elif change == \"SR\":\n                prob = prob * 0.6; activityToday = \"Run\"; activityList.append(\"Run\")\n            else:\n                prob = prob * 0.2; activityToday = \"Icecream\"; activityList.append(\"Icecream\")\n        elif activityToday == \"Run\":\n            change = np.random.choice(transitionName[1],replace=True,p=transitionMatrix[1])\n            if change == \"RR\":\n                prob = prob * 0.5; activityList.append(\"Run\"); pass\n            elif change == \"RS\":\n                prob = prob * 0.2; activityToday = \"Sleep\"; activityList.append(\"Sleep\")\n            else:\n                prob = prob * 0.3; activityToday = \"Icecream\"; activityList.append(\"Icecream\")\n        elif activityToday == \"Icecream\":\n            change = np.random.choice(transitionName[2],replace=True,p=transitionMatrix[2])\n            if change == \"II\":\n                prob = prob * 0.1; activityList.append(\"Icecream\"); pass\n            elif change == \"IS\":\n                prob = prob * 0.2; activityToday = \"Sleep\"; activityList.append(\"Sleep\")\n            else:\n                prob = prob * 0.7; activityToday = \"Run\"; activityList.append(\"Run\")\n        i += 1\n    print(\"Possible states: \" + str(activityList))\n    print(\"End state after \"+ str(days) + \" days: \" + activityToday)\n    print(\"Probability of the possible sequence of states: \" + str(prob))\n\nactivity_forecast(2)\n```\n\nSaída exemplo:\n```\nStart state: Sleep\nPossible states: ['Sleep', 'Sleep', 'Run']\nEnd state after 2 days: Run\nProbability of the possible sequence of states: 0.12\n```\n\nPara aproximar a probabilidade teórica de 62%, repete-se a simulação milhares de vezes e conta-se a fração que termina em `Run`:\n\n```python\n# (mesma activity_forecast, mas retornando activityList em vez de imprimir)\nlist_activity = []\ncount = 0\nfor iterations in range(1,10000):\n        list_activity.append(activity_forecast(2))\nfor smaller_list in list_activity:\n    if(smaller_list[2] == \"Run\"):\n        count += 1\npercentage = (count/10000) * 100\nprint(\"The probability of starting at state:'Sleep' and ending at state:'Run'= \" + str(percentage) + \"%\")\n# Saída: ~62.42%\n```\n\n### Nota — Lei dos Grandes Números\n\nComo aproximamos os 62%? Isso é a **Lei dos Grandes Números (law of large numbers)**: as frequências de eventos com a mesma probabilidade de ocorrência se equilibram, **mas só se houver tentativas suficientes**. Em outras palavras, conforme o número de experimentos aumenta, a proporção real de resultados converge para a proporção teórica/esperada.\n\n### Conclusão\n\nCadeias de Markov simples são um dos tópicos fundamentais para começar com data science em Python. Foram introduzidas a cadeia de Markov e algumas de suas propriedades.\n\n> *Autora: Sejal Jaiswal — Software Developer, Data Scientist.*\n", "explicacao": "# Cadeias de Markov e o Comportamento do Usuário — Explicação\n\n> **Matéria:** Computação / Programação · **Autoestudo:** 05 · **Data:** 13/05/2026 · **Professor:** Jefferson de Oliveira Silva\n>\n> Explicação do tutorial da DataCamp (ver [`01-material.md`](01-material.md)). É a **sequência direta** do [Prog-04 (Introdução às Cadeias de Markov)](../autoestudo-04-introducao-as-cadeias-de-markov/02-explicacao.md): aqui pegamos a teoria e a aplicamos a **comportamento**, com código rodando e as **propriedades formais** das cadeias.\n\n---\n\n## 1. Contexto geral: do \"humor da CJ\" ao comportamento do usuário\n\nO tutorial usa um exemplo charmoso: a **CJ**, quando triste, ou dorme, ou corre, ou come sorvete — e o que ela faz amanhã depende do que fez hoje. Troque \"CJ\" por \"usuário do seu app\" e \"dormir/correr/sorvete\" por \"Home / Produto / Carrinho\", e você tem **exatamente** o que o título promete: modelar o **comportamento do usuário** como uma cadeia de Markov.\n\nÉ essa a grande ideia deste autoestudo: a jornada de um usuário num produto digital é uma **sequência de estados** (telas, ações, status), e na maioria das vezes **o próximo passo depende principalmente de onde ele está agora**. Isso torna as cadeias de Markov uma ferramenta natural para responder perguntas de negócio como: *\"de quem entra na Home, que fração chega à compra?\"*, *\"onde os usuários mais desistem?\"*, *\"se eu melhorar a página de Produto, quanto isso muda a conversão final?\"*.\n\n> O Prog-04 te deu os conceitos (estado, matriz de transição, memorylessness, distribuição estacionária). Aqui eu assumo isso e foco em: **(a)** aplicar a comportamento, **(b)** as propriedades formais que classificam uma cadeia, e **(c)** ver o código rodar e tocar a Lei dos Grandes Números.\n\n---\n\n## 2. Conceitos-chave\n\n### 2.1. Recapitulando a propriedade de Markov (com a fórmula)\n\nO tutorial traz a definição formal que vale internalizar:\n\n```\nPr( Xn+1 = x | X1=x1, X2=x2, …, Xn=xn )  =  Pr( Xn+1 = x | Xn=xn )\n```\n\nEm português: a probabilidade do próximo estado, **dado todo o histórico**, é igual à probabilidade **dado só o estado atual**. Todo o passado (`X1…Xn-1`) é irrelevante. Aplicado a usuário: *para prever a próxima tela, basta saber em que tela ele está agora* — não importa o caminho que ele fez até ali. (É uma simplificação, e voltaremos à sua limitação.)\n\nUm detalhe que o tutorial formaliza: a matriz de transição precisa ser uma **matriz estocástica** — cada **linha soma exatamente 1**, porque cada linha é a distribuição de probabilidade de \"para onde vou a partir deste estado\".\n\n### 2.2. O exemplo trabalhado: prevendo 2 passos à frente\n\nEsse cálculo é o coração do tutorial e merece atenção, porque é a mecânica de \"prever o futuro\" numa cadeia. Pergunta: começando em `Sleep`, qual a chance de estar em `Run` depois de **2 dias**?\n\nVocê **soma todos os caminhos** que levam de Sleep a Run em 2 passos:\n\n| Caminho | Probabilidade |\n|---|---|\n| Sleep → Sleep → Run | 0,2 × 0,6 = 0,12 |\n| Sleep → Run → Run | 0,6 × 0,6 = 0,36 |\n| Sleep → Icecream → Run | 0,2 × 0,7 = 0,14 |\n| **Total** | **0,62 (62%)** |\n\nRepare que isso é **exatamente** o que significa \"elevar a matriz ao quadrado\" (`P²`), que vimos no Prog-04: multiplicar matrizes *é* somar todos os caminhos passando por estados intermediários. Aqui você vê a conta por extenso.\n\n> **Tradução para usuário:** \"de quem está na Home hoje, que fração estará no Carrinho depois de 2 cliques?\" — mesma conta, somando todos os caminhos de 2 passos.\n\n### 2.3. As 5 propriedades que classificam uma cadeia (o aprofundamento)\n\nO Prog-04 mencionou tipos de estado de leve. O tutorial formaliza cinco propriedades — e elas têm leitura direta em comportamento do usuário:\n\n| Propriedade | Definição | Leitura em \"comportamento do usuário\" |\n|---|---|---|\n| **Irredutibilidade (irreducibility)** | dá pra chegar a qualquer estado a partir de qualquer outro | de qualquer tela, o usuário consegue (com algum caminho) chegar a qualquer outra |\n| **Periodicidade (periodicity)** | o estado só se repete em múltiplos de k > 1 | raro em UX; indicaria um ciclo rígido (ex.: um wizard que sempre volta de X em X passos) |\n| **Transitoriedade (transience)** | partindo do estado, há chance de **nunca** voltar | telas de **onboarding / primeiro acesso** (você passa uma vez e não volta) |\n| **Recorrência (recurrence)** | você sempre acaba voltando ao estado | a tela de **catálogo/busca**, revisitada o tempo todo |\n| **Estado absorvente (absorbing)** | uma vez dentro, não sai (p_ii = 1) | **Compra concluída** ou **Churn (cancelamento)** — fim da jornada |\n| **Ergodicidade (ergodicity)** | aperiódico + recorrente positivo (toda a cadeia, se irredutível e ergódica) | a cadeia tem um comportamento de equilíbrio estável de longo prazo (existe distribuição estacionária) |\n\n> A **ergodicidade** é a ponte que justifica simular: numa cadeia ergódica, observar **uma** jornada longa revela as probabilidades de **todo** o sistema (vimos isso com rigor no [Matemática-02](../../matematica/autoestudo-02-processos-estocasticos-cadeias-de-markov-e-metodo-de-monte-carlo/02-explicacao.md)).\n\n### 2.4. Duas formas de responder à mesma pergunta: analítica vs. simulação\n\nO tutorial é genial porque mostra **duas rotas** para o mesmo 62%:\n\n1. **Rota analítica (matemática):** somar os caminhos → 0,62 exato. Rápido e preciso, mas fica inviável de fazer \"na mão\" quando há muitos estados e muitos passos.\n2. **Rota da simulação (Monte Carlo):** programe a cadeia, rode a jornada **10.000 vezes** aleatoriamente, conte quantas terminaram em `Run`, e divida. Resultado: **62,42%** — converge para os 62% teóricos.\n\nPor que a simulação funciona? Pela **Lei dos Grandes Números (Law of Large Numbers)**: conforme o número de tentativas cresce, a frequência observada converge para a probabilidade verdadeira. **Aqui está, literalmente, a fusão dos dois pilares do módulo:** a **Cadeia de Markov** define as regras de transição; o **Monte Carlo** (rodar 10.000 simulações) estima o resultado. Markov + Monte Carlo, na prática, em ~20 linhas de Python.\n\n### 2.5. A limitação honesta (e por que importa para usuário)\n\nA memorylessness é uma simplificação poderosa, mas às vezes **enganosa para comportamento humano**. Exemplo: um usuário que chega ao carrinho na **10ª visita** provavelmente tem intenção de compra muito diferente de quem chega na **1ª** — mas o Markov \"puro\" os trata igual, porque só olha o estado atual. Quando o histórico importa, usa-se **cadeias de ordem superior** (olham os últimos 2-3 estados) ou modelos com memória (os Transformers, que vimos no Prog-02). Saber *quando a suposição de Markov quebra* é sinal de maturidade.\n\n---\n\n## 3. Exemplo prático: adaptando o código da CJ para um funil\n\nO mesmo código do tutorial, com os estados trocados para uma jornada de usuário (a estrutura é idêntica):\n\n```python\nimport numpy as np\n\nestados = [\"Home\", \"Produto\", \"Carrinho\"]\n# P[i][j] = probabilidade de ir do estado i para o estado j (cada linha soma 1)\nP = [[0.3, 0.6, 0.1],   # de Home\n     [0.2, 0.4, 0.4],   # de Produto\n     [0.1, 0.3, 0.6]]   # de Carrinho\n\ndef simular_jornada(passos, inicio=0):\n    atual = inicio\n    caminho = [estados[atual]]\n    for _ in range(passos):\n        atual = np.random.choice(len(estados), p=P[atual])\n        caminho.append(estados[atual])\n    return caminho\n\n# Rode 10.000 vezes e estime onde os usuários acabam após 2 cliques (Lei dos Grandes Números)\nfim = [simular_jornada(2)[-1] for _ in range(10000)]\nfor e in estados:\n    print(e, fim.count(e)/10000)\n```\n\nEsse mini-modelo já responde \"de quem começa na Home, que fração está no Carrinho após 2 cliques?\". **E a ponte com teste A/B:** se um teste A/B na página de Produto aumentar a transição `Produto→Carrinho` de 0,4 para 0,5, você muda *um número na matriz* e re-simula para **projetar** o impacto na conversão final — antes mesmo de o teste completo terminar.\n\n---\n\n## 4. Cases reais no mundo\n\n- **PageRank (Google):** a aplicação mais famosa — o \"surfista aleatório\" navegando links é uma cadeia de Markov; a distribuição estacionária define a relevância das páginas.\n- **Modelos de atribuição de marketing:** o Google Analytics tem um modelo de atribuição \"baseado em cadeias de Markov\" que distribui o crédito de uma conversão entre os canais (e-mail, busca, social) modelando a jornada como transições entre estados — exatamente o tema deste autoestudo.\n- **Previsão de churn (SaaS):** empresas modelam a jornada do assinante com `Churn` como **estado absorvente** e calculam a probabilidade e o tempo esperado até o cancelamento.\n- **Reddit Subreddit Simulator:** citado no próprio tutorial — gera posts e comentários automáticos via cadeias de Markov treinadas em texto real.\n\n---\n\n## 5. Conexão com o módulo\n\n- **Prog-04 (Introdução às Cadeias de Markov):** este é o \"nível 2\" — pega a teoria e aplica a comportamento, com código e propriedades formais.\n- **Prog-02 / Matemática-02 (Monte Carlo & Processos Estocásticos):** a simulação que aproxima os 62% é Monte Carlo puro, justificada pela **Lei dos Grandes Números**. Markov define as regras; Monte Carlo as roda.\n- **Matemática-01 (Distribuições):** cada linha da matriz é uma distribuição de probabilidade; o resultado da simulação converge para a distribuição teórica.\n- **Teste A/B (tema do módulo) e Negócios-01 (Experimentação):** modelar o funil como Markov permite **traduzir** o efeito local de um teste A/B (melhorar uma transição) em impacto **global** na conversão. É a ponte entre \"a variante venceu\" e \"quanto isso vale no fim do funil\".\n- **UX (jornada e arquitetura da informação):** a sequência de telas que o usuário percorre é, ao mesmo tempo, objeto de UX e os \"estados\" da cadeia.\n\n---\n\n## 6. Resumo estruturado\n\n- **Comportamento do usuário como cadeia de Markov:** telas/ações = **estados**; o próximo passo depende (sobretudo) só do estado atual.\n- **Propriedade de Markov (fórmula):** `Pr(Xn+1 | todo o passado) = Pr(Xn+1 | Xn)`. Matriz de transição **estocástica** (linhas somam 1).\n- **Prever n passos:** somar todos os caminhos = elevar a matriz à potência. Ex.: Sleep→Run em 2 dias = 62%.\n- **5 propriedades:** irredutibilidade, periodicidade, transitoriedade/recorrência, **ergodicidade**, **estado absorvente** (Compra/Churn).\n- **Duas rotas para a resposta:** analítica (somar caminhos) vs. **simulação Monte Carlo** (rodar 10.000 vezes → 62,42%), justificada pela **Lei dos Grandes Números**.\n- **Limitação:** memorylessness ignora o histórico (1ª vs. 10ª visita) → ordem superior / Transformers quando o passado importa.\n- **Aplicação-chave:** projetar o impacto de um teste A/B (mudança numa transição) na conversão final do funil.\n\n---\n\n## 7. Auto-reflexão (pra pensar sozinha)\n\n1. No exemplo da CJ, refizemos a conta de \"Sleep→Run em 2 dias = 62%\" somando 3 caminhos. Tente, no papel, calcular a chance de \"Sleep→Icecream em 2 dias\". (Dica: liste os 3 caminhos e some os produtos.)\n2. Por que rodar a simulação **10.000 vezes** dá ~62%, mas rodar só **10 vezes** daria um número instável e provavelmente errado? Qual lei explica isso — e como ela se conecta com o \"volume mínimo\" exigido num teste A/B?\n3. Modelar a jornada do usuário com Markov assume que a 1ª e a 10ª visita ao carrinho são iguais. Dê um exemplo de produto onde essa suposição te levaria a uma conclusão errada sobre conversão.\n"}, {"id": "computacao-autoestudo-06-fundamentos-de-programacao-de-testes-ab", "materia_slug": "computacao", "materia_label": "Computação", "materia_emoji": "💻", "slug": "autoestudo-06-fundamentos-de-programacao-de-testes-ab", "numero": "06", "title": "Fundamentos de Programação de Testes A/B", "date": "19/05/2026", "material": "# Fundamentos de Programação de Testes A/B\n\n> **Data:** 19/05/2026 — 10:00h\n> **Matéria:** Computação\n> **Autoestudo:** 01\n\nEste material compila três fontes: (1) artigo em PT sobre fundamentos e estratégia de teste A/B, (2) artigo em EN sobre implementação em Python, e (3) descrição de vídeo sobre tópicos avançados.\n\n---\n\n## Parte 1 — Teste A/B: o que é e como implementar na estratégia do seu negócio\n\n> Fonte: artigo em português.\n\nO teste A/B é uma das estratégias mais utilizadas por empreendedores e gestores de marketing para aprimorar resultados.\n\nUm dos principais pontos fortes do marketing digital é o seu poder de permitir testes e mensurar resultados. É isso que permite a compreensão das ações que estão gerando os resultados esperados e das que precisam de ajustes.\n\nUma das maneiras mais populares e eficazes de experimentar, analisar e monitorar resultados é o teste A/B.\n\n### O que são testes A/B?\n\nTestes A/B, também conhecidos como **teste de divisão** ou **teste bucket**, são experimentos feitos para comparar duas versões de uma página.\n\nBasicamente, ele divide o tráfego de uma página em duas versões: uma já existente e outra nova, desenvolvida com algumas modificações. O objetivo é medir qual das versões apresenta uma maior **taxa de conversão**.\n\nSão bastante utilizados em estratégias de marketing digital, como e-mail marketing, landing pages, anúncios, etc. E devem ser feitos entre páginas que tem **uma só variável**, e não várias.\n\nPor exemplo, uma variável tem um botão verde, enquanto a outra tem um botão azul. Ou seja, não é uma página que tem um botão verde e a outra que tem um formulário.\n\n### Por que os testes A/B são importantes?\n\nOs testes A/B são ótimas ferramentas para obter um retorno real por parte da audiência, já que geram dados reais e mensuráveis sobre ela.\n\nÉ comum que profissionais fiquem em dúvida se devem ou não seguir um palpite. É claro que a experiência pode falar mais alto algumas vezes, mas é indispensável trabalhar com foco na análise de dados, não em \"achismos\". É o que chamamos de **data driven marketing**.\n\nUma das grandes vantagens de atuar no ambiente digital é ter acesso aos dados dos consumidores. Isso torna as estratégias de venda mais eficientes, uma vez que você consegue entender com clareza o comportamento e as necessidades dos compradores.\n\n### Onde usar os testes A/B?\n\nCanais:\n\n- Páginas de um site\n- Landing pages\n- E-mail marketing\n- Anúncios no Google (Google Ads)\n- Anúncios em redes sociais (Facebook Ads e outros)\n\nElementos dentro desses canais:\n\n- Títulos\n- Links de navegação\n- Botões de CTA (Call to Action)\n- Assunto do e-mail\n- Imagens ou vídeos\n- Oferta\n- Textos variados\n\nApesar de o teste A/B poder ser utilizado em todos esses canais, a escolha deve ser feita com atenção. Não é preciso apostar em todas as possibilidades de uma só vez — analise os objetivos, implemente aos poucos e analise os resultados.\n\n### Benefícios de fazer testes A/B\n\n1. **Facilidade de implementação** — basta ter audiência apropriada e uma boa ferramenta. O processo é simples, sem exigência de conhecimentos profundos.\n2. **Decisões mais acertadas** — gera números concretos, possibilitando tomada de decisão baseada em dados.\n3. **Compreensão profunda da audiência** — entender o que os consumidores querem. Lançando uma campanha de e-mail com dois ou três títulos diferentes, é possível compreender qual mais agradou à audiência.\n\n### Como fazer testes A/B?\n\n1. **Defina a variável a ser testada** — um teste de cada vez, pra evitar confusão na análise.\n2. **Estabeleça uma meta para o teste A/B** — aprimorar geração de leads, acessos, aumentar taxa de abertura, de cliques, etc.\n3. **Use uma ferramenta de teste A/B** — Google Optimize, Optimizely, entre outras.\n4. **Divida os grupos de amostra** — aleatoriamente, com a mesma quantidade de pessoas em cada grupo.\n5. **Escolha uma métrica para definir o vencedor** — alinhada com a meta.\n6. **Analise os resultados** — mensurar, rever, ajustar.\n\n### Qual a diferença entre CRO e teste A/B?\n\n- **Teste A/B**: compara variáveis de marketing, com o objetivo de definir a que gera retorno melhor.\n- **CRO (Conversion Rate Optimization)**: estratégia mais ampla, conjunto de práticas voltadas para o aumento das conversões de um site. Aproveita o tráfego que as páginas já têm, sem necessariamente atrair mais visitantes.\n\n### Qual a diferença entre testes multivariados e testes A/B?\n\n- **Testes multivariados**: testam mais de uma variável de uma única vez.\n- **Testes A/B**: testam só uma variável (com duas ou mais variações) por vez.\n\nO foco é sempre chegar a uma conclusão de qual é a melhor opção entre as testadas.\n\n### Ferramentas para realizar teste A/B\n\n1. **Google Optimize** — ferramenta do Google, versão gratuita e paga. Integrada com Google Analytics.\n2. **Optimizely** — uso simples, requer adicionar uma linha de JavaScript no site.\n3. **VWO** — recursos amplos, não só A/B mas otimização de conversões em geral. 30 dias de teste gratuito.\n\n### Quando fazer o teste A/B?\n\nQuando há necessidade de entender qual das opções viáveis de uma ação é a que mais faz sentido para o negócio. Por exemplo, ao lançar um produto novo e estar em dúvida sobre qual mensagem usar pro público.\n\n### Perguntas Frequentes\n\n**Como fazer o teste A/B?** Defina a variável, a meta, a ferramenta, divida os grupos, escolha a métrica e analise os resultados.\n\n**Quando fazer um teste A/B?** Quando há a necessidade de entender qual das opções viáveis de uma ação gera resultado.\n\n**Para que serve o teste A/B?** Gerar retorno real sobre a audiência, fazendo com que se trabalhe focado em dados reais e mensuráveis.\n\n**O que é o teste A/B do Facebook?** Ferramenta do Facebook que permite anunciantes desenvolverem testes comparativos para entender quais estratégias geram mais resultados.\n\n---\n\n## Parte 2 — A/B Testing and how to implement it in Python using just a few lines of code\n\n> Fonte: artigo em inglês, por Zipporah Luna (Medium, jul/2021).\n\nA brief explanation of how A/B testing is helping businesses make strategic decisions and how to implement it in Python using just a few lines of code.\n\n### What is A/B Testing?\n\nAn A/B Test is a randomised experiment containing two groups, A & B, that receive different experiences. Within an A/B Test, we look to understand and measure the response of each group.\n\n### How to measure and understand A/B Testing results?\n\nTo measure and understand the results of your conducted A/B Tests, you can use the **Two-Sample hypothesis test** or **Independent Samples t-test**.\n\n> \"The two-sample t-test (also known as the independent samples t-test) is a method used to test whether the unknown population means of two groups are equal or not.\"\n\n### Some examples of A/B Testing put into practice\n\n- Online advertisement strategies\n- Email subject lines when contacting customers\n- Testing the effect of mailing customers a coupon versus a control group\n- Netflix testing different images for the same movie\n- Amazon testing new website features to stay ahead of their competition\n\n### How to Implement in Python?\n\n**Sample Problem:** Identify if a nicer looking promotional mailer would get more customers to sign-up for a delivery club that costs $100.\n\nEtapas (descritas no artigo, com prints/snippets de código no original):\n\n1. Import Required Packages\n2. Get observed frequencies\n3. State hypotheses\n4. Calculate and get results\n5. Result Summary\n\n### Result Summary\n\nThe sample problem assessed the difference in sign-up rate to the club between two different mailers that were sent. Based on the data provided and using the **chi-squared test for independence**, the recommendation to ABC Grocery (and its marketing department) is that they can stop sending an expensive looking mailer — or even a simple mailer — to save costs, as it does not help in getting customers to sign-up for the delivery club promo.\n\n---\n\n## Parte 3 — A/B Test Like a Pro #6: Advanced Topics in A/B Testing\n\n> Fonte: descrição de vídeo.\n\nEste vídeo aborda tópicos avançados em testes A/B, como:\n\n- **Eventos de ativação** — o que são e quando usá-los.\n- **Execução de múltiplos testes A/B simultaneamente** — se é possível e como.\n- **Análise dos resultados dos testes no BigQuery** — como testar objetivos que não são suportados no console.\n", "explicacao": "# Fundamentos de Programação de Testes A/B — Explicação\n\n> **Material original:** [01-material.md](01-material.md)\n> **Modo:** EXPLICAR\n> **Como ler:** vai do mais básico ao mais avançado. Se já souber o começo, pula. Mas se for a primeira vez que você vê teste A/B, leia tudo na ordem — cada bloco se apoia no anterior.\n\n---\n\n## 1. Contexto geral: por que teste A/B existe?\n\nImagina que você abre uma sorveteria nova. Você está em dúvida entre dois sabores pra promover na vitrine: pistache e brigadeiro. Qual chama mais cliente?\n\nVocê tem dois caminhos:\n\n- **Caminho do \"achismo\":** você acha que brigadeiro vende mais porque é mais brasileiro, mais conhecido, mais óbvio. Coloca brigadeiro na vitrine. Vende razoavelmente bem. Fim.\n- **Caminho do experimento:** você divide a vitrine em duas metades, brigadeiro de um lado e pistache do outro, durante duas semanas. Conta quantos cones de cada saíram. No fim, você *sabe* qual vendeu mais — e por quanto.\n\nO segundo caminho é, em essência, um **teste A/B**. Você comparou duas opções, expostas em condições parecidas, e mediu a resposta com dados reais.\n\n**De onde isso vem?** Não é uma invenção da internet. A ideia de experimento controlado nasceu no começo do século XX, principalmente com o estatístico **Ronald Fisher**, que projetava experimentos agrícolas — qual variedade de trigo dava mais grão? — usando aleatorização e grupos de controle. Depois, a medicina herdou a metodologia nos **ensaios clínicos** (clinical trials): grupo que recebe o remédio vs grupo que recebe placebo (uma pílula falsa, sem o princípio ativo).\n\nA internet pegou essa metodologia e turbinou. Por quê? Porque online você pode:\n\n- Mostrar a versão A pra metade dos visitantes e a versão B pra outra metade, **automaticamente**.\n- Rodar o experimento por horas ou dias em vez de anos.\n- Medir cada clique, cada compra, cada milissegundo de tempo na página.\n- Repetir indefinidamente, com custo baixíssimo.\n\nÉ por isso que teste A/B virou onipresente em produto digital,
